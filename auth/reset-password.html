<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Jojo Wellness</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/resources/CSS/index.css">
    <link rel="stylesheet" href="/resources/CSS/auth.css">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data:;">
</head>
<body>

    <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
        <div class="navbar-inner">
            <a href="/index.html" class="nav-brand">Jojo<em>Wellness</em></a>
            <ul class="nav-links" role="list">
                <li><a href="/auth/login.html" class="nav-pill">Log In</a></li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="mobileNav">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="mobile-nav" id="mobileNav">
        <a href="/auth/login.html" onclick="closeNav()">Log In &rarr;</a>
    </div>

    <main class="auth-page">
        <div class="auth-card">

            <!-- Request reset form (shown when no token in URL) -->
            <div id="requestView">
                <p class="section-label">Account Recovery</p>
                <h1>Forgot Password?</h1>
                <p class="auth-sub">Enter your email and we'll send you a reset link.</p>

                <form id="requestForm" novalidate>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="requestBtn">Send Reset Link</button>
                </form>

                <div class="auth-footer" style="margin-top:1.2rem;">
                    <a href="/auth/login.html">&larr; Back to Login</a>
                </div>
            </div>

            <!-- New password form (shown when recovery token detected) -->
            <div id="resetView" style="display:none;">
                <p class="section-label">New Password</p>
                <h1>Reset Password</h1>
                <p class="auth-sub">Choose a strong new password for your account.</p>

                <form id="resetForm" novalidate>
                    <div class="form-group">
                        <label for="new_password">New Password</label>
                        <input type="password" id="new_password" name="new_password" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8">
                        <div class="pw-strength" aria-hidden="true">
                            <div class="pw-strength-bar" id="pwBar"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm_new">Confirm Password</label>
                        <input type="password" id="confirm_new" name="confirm_new" placeholder="Repeat new password" autocomplete="new-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="resetBtn">Update Password</button>
                </form>
            </div>

            <!-- Success state -->
            <div id="successView" style="display:none; text-align:center; padding:1.5rem 0;">
                <p style="font-size:2rem; margin-bottom:0.8rem;">&#10003;</p>
                <h2 style="font-size:1.2rem; margin-bottom:0.6rem;">Password Updated!</h2>
                <p style="color:var(--text-muted); font-size:0.875rem; margin-bottom:1.5rem;">
                    Your password has been changed successfully.
                </p>
                <a href="/auth/login.html" class="btn btn-primary">Go to Login</a>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/resources/JS/supabase-client.js"></script>
    <script src="/resources/JS/auth.js"></script>
    <script src="/resources/JS/index.js"></script>
    <script>
        // Password strength indicator
        document.getElementById('new_password').addEventListener('input', function () {
            var bar = document.getElementById('pwBar');
            var val = this.value;
            bar.className = 'pw-strength-bar';
            if (val.length === 0) return;
            if (val.length < 8) { bar.classList.add('weak'); return; }
            var strong = /[A-Z]/.test(val) && /[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val);
            var medium = /[A-Z]/.test(val) || /[0-9]/.test(val);
            bar.classList.add(strong ? 'strong' : medium ? 'medium' : 'weak');
        });

        // Detect recovery token from URL hash — Supabase fires PASSWORD_RECOVERY event
        window.auth.onAuthChange(function (event) {
            if (event === 'PASSWORD_RECOVERY') {
                document.getElementById('requestView').style.display = 'none';
                document.getElementById('resetView').style.display = 'block';
            }
        });

        // Send reset email
        document.getElementById('requestForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            var btn   = document.getElementById('requestBtn');
            var email = document.getElementById('email').value.trim();

            if (!email) { window.auth.toast('Please enter your email.', 'error'); return; }

            btn.disabled = true;
            btn.textContent = 'Sending…';

            var { error } = await window.auth.sendResetEmail(email);

            if (error) {
                window.auth.toast(error.message || 'Could not send reset email.', 'error');
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
                return;
            }

            window.auth.toast('Reset link sent! Check your inbox.', 'success');
            btn.textContent = 'Email Sent ✓';
        });

        // Update password
        document.getElementById('resetForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            var btn     = document.getElementById('resetBtn');
            var pw      = document.getElementById('new_password').value;
            var confirm = document.getElementById('confirm_new').value;

            if (pw.length < 8) { window.auth.toast('Password must be at least 8 characters.', 'error'); return; }
            if (pw !== confirm) { window.auth.toast('Passwords do not match.', 'error'); return; }

            btn.disabled = true;
            btn.textContent = 'Updating…';

            var { error } = await window.auth.updatePassword(pw);

            if (error) {
                window.auth.toast(error.message || 'Could not update password.', 'error');
                btn.disabled = false;
                btn.textContent = 'Update Password';
                return;
            }

            document.getElementById('resetView').style.display = 'none';
            document.getElementById('successView').style.display = 'block';
        });
    </script>
</body>
</html>
