<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard — Jojo Wellness</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/resources/CSS/index.css">
    <link rel="stylesheet" href="/resources/CSS/auth.css">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob:;">
</head>
<body>

    <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
        <div class="navbar-inner">
            <a href="/index.html" class="nav-brand">Jojo<em>Wellness</em></a>
            <ul class="nav-links" role="list">
                <li><a href="/index.html#programs">Programs</a></li>
                <li><a href="/index.html#contact">Contact</a></li>
                <li><button class="nav-pill" id="logoutBtn" style="background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; font-family:Montserrat,sans-serif; font-size:0.78rem; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; padding:0.45rem 1.2rem; border-radius:50px;">Log Out</button></li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="mobileNav">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="mobile-nav" id="mobileNav">
        <a href="/index.html#programs" onclick="closeNav()">Programs</a>
        <a href="/index.html#contact"  onclick="closeNav()">Contact</a>
        <a href="#" id="mobileLogout"  onclick="closeNav()">Log Out &rarr;</a>
    </div>

    <div class="dashboard-page">
        <div class="dashboard-wrap">

            <!-- Profile strip -->
            <div class="dash-profile" id="profileStrip">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <div class="profile-info">
                    <h3 id="profileName">Loading…</h3>
                    <p id="profileMeta"></p>
                </div>
            </div>

            <div class="dash-header">
                <p class="section-label">Client Portal</p>
                <h1>My Dashboard</h1>
                <p class="dash-sub">Your training programs and progress — all in one place.</p>
            </div>

            <!-- Tab navigation -->
            <div class="dash-tabs" role="tablist">
                <button class="dash-tab active" role="tab" aria-selected="true"  data-tab="programs">My Programs</button>
                <button class="dash-tab"        role="tab" aria-selected="false" data-tab="progress">Progress</button>
            </div>

            <!-- Programs panel -->
            <div class="dash-panel active" id="panel-programs" role="tabpanel">
                <div id="programsGrid" class="programs-dash-grid">
                    <div class="empty-state"><span class="spinner"></span></div>
                </div>
            </div>

            <!-- Progress panel -->
            <div class="dash-panel" id="panel-progress" role="tabpanel">
                <div class="dash-card">
                    <h3>Weight Progress</h3>
                    <p style="margin-bottom:1.2rem;">Track your weight over time.</p>
                    <div class="progress-chart" id="progressChart">
                        <div class="empty-state"><p>No logs yet.</p></div>
                    </div>
                </div>

                <div class="dash-card" style="margin-top:1.2rem;">
                    <h3>Log a Check-in</h3>
                    <form class="log-form" id="logForm">
                        <div class="form-group">
                            <label for="log_date">Date</label>
                            <input type="date" id="log_date" name="log_date" required>
                        </div>
                        <div class="form-group">
                            <label for="log_weight">Weight (kg)</label>
                            <input type="number" id="log_weight" name="log_weight" placeholder="65.5" step="0.1" min="30" max="300">
                        </div>
                        <div class="form-group">
                            <label for="log_notes">Notes</label>
                            <input type="text" id="log_notes" name="log_notes" placeholder="Feeling great today…">
                        </div>
                        <button type="submit" class="btn btn-primary" id="logBtn">Add Log</button>
                    </form>
                </div>

                <div id="logsList" style="margin-top:1.2rem;"></div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/resources/JS/supabase-client.js"></script>
    <script src="/resources/JS/auth.js"></script>
    <script src="/resources/JS/client-dashboard.js"></script>
    <script src="/resources/JS/index.js"></script>
</body>
</html>
